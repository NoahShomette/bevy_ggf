[package]
name = "bevy_ggf"
version = "0.1.0"
edition = "2021"
description = "A framework for creating grid based games in bevy"
license = "MIT OR Apache-2.0"
repository = "https://github.com/NoahShomette/bevy_ggf"


# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
bevy = { version = "0.9.0", features = ["bevy_asset", "bevy_scene", "bevy_gilrs", "bevy_winit", "animation", "x11",  "filesystem_watcher", "render", "serialize",], default-features = false }
bevy_ecs_tilemap = "0.8.0"
leafwing-input-manager = "0.6.1"
iyes_loopless = "0.8.0"
typetag = "0.2.3"
bevy_spicy_networking = {git = "https://github.com/NoahShomette/bevy_spicy_networking.git"}
